version: '3.9'

services:

  flask-app:

    build: .

    container_name: flask-fraud-app

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    networks:
      - fraud-network

  mongodb:

    image: mongo

    container_name: mongodb

    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - fraud-network

  mongo-express:

    image: mongo-express

    container_name: mongo-express

    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_SERVER: mongodb

    depends_on:
      - mongodb

    networks:
      - fraud-network

volumes:
  mongo-data:

networks:
  fraud-network: